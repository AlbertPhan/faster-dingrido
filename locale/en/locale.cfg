[mod-setting-name]
dingrido-friction=Dingrido Friction
dingrido-rotation-snap-angle=Dingrido Rotation Snap Angle
dingrido-power-consumption=Dingrido Power Consumption
dingrido-fuel-effectivity=Dingrido Fuel Efficiency
dingrido-braking-power=Dingrido Braking Force


[mod-setting-description]
dingrido-friction=Adjusts the friction of the Dingrido which affects acceleration and top speed. Lower is faster. Original friction is 0.003
dingrido-rotation-snap-angle=Adjusts the rotation snap angle in degrees of the Dingrido which affects how sharply it can turn. Lower is sharper. Default 22.5 for 16 directions.
dingrido-power-consumption=Adjusts the power consumption of the Dingrido which affects how fast it can accelerate. eg "20MW"
